<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 写小说神器 永久版</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>AI 写小说神器 永久版</h1>
          <p id="cacheState">等待参考文本</p>
        </div>
        <div class="top-actions">
          <button id="checkinBtn" type="button">签到领 2500 字</button>
          <button id="generateAllBtn" class="primary-action" type="button">一键生成</button>
        </div>
      </header>

      <section class="studio-grid">
        <aside class="control-pane">
          <section class="panel">
            <div class="panel-title">
              <h2>灵感输入</h2>
              <span id="uploadStatus" class="status-pill">私有库未载入</span>
            </div>
            <textarea id="inspiration" class="large-input" placeholder="一句灵感、开局冲突、卖点或想写的梗"></textarea>
            <label>
              <span>题材</span>
              <input id="genre" type="text" placeholder="悬疑 / 都市 / 科幻 / 玄幻 / 言情" />
            </label>
            <label>
              <span>地点</span>
              <input id="location" type="text" placeholder="边境小城、废弃车站、近未来上海" />
            </label>
            <label>
              <span>背景</span>
              <textarea id="background" placeholder="时代背景、社会秩序、核心事件"></textarea>
            </label>
            <label>
              <span>人物设定</span>
              <textarea id="characters" placeholder="主角、配角、关系、秘密与缺陷"></textarea>
            </label>
          </section>

          <section class="panel">
            <div class="panel-title">
              <h2>模块化配置</h2>
            </div>
            <label>
              <span>文风</span>
              <select id="writingStyle">
                <option value="参考文本优先，语言克制，避免AI腔">参考文本优先</option>
                <option value="短句强冲突，快节奏推进">短句快节奏</option>
                <option value="细腻情绪流，重视感官细节">细腻情绪流</option>
                <option value="冷峻悬疑感，线索藏在动作里">冷峻悬疑感</option>
              </select>
            </label>
            <label>
              <span>模板</span>
              <select id="template">
                <option value="开局异常-冲突升级-章末悬念">爆款开篇</option>
                <option value="目标受阻-误会加深-关系反转">情绪拉扯</option>
                <option value="线索出现-错误推理-反证结尾">悬疑反转</option>
                <option value="压迫开局-获得筹码-正面打脸">升级爽文</option>
              </select>
            </label>
            <label>
              <span>公有库</span>
              <select id="publicLibrary"></select>
            </label>
          </section>

          <section class="panel">
            <div class="panel-title">
              <h2>私有库样章</h2>
              <button id="analyzeBtn" type="button">文风分析</button>
            </div>
            <label class="file-picker">
              <input id="referenceFile" type="file" accept=".txt,text/plain" />
              <span>选择 TXT 文件</span>
            </label>
            <textarea id="referenceText" class="reference-input" placeholder="粘贴样章，系统会学习文风"></textarea>
            <button id="uploadBtn" type="button">保存到私有库</button>
          </section>

          <section class="action-grid" aria-label="生成操作">
            <button id="worldBtn" type="button">生成世界观</button>
            <button id="plotBtn" type="button">生成完整大纲</button>
            <button id="coverBtn" type="button">生成精美封面</button>
            <button id="directionsBtn" type="button">生成剧情走向</button>
            <button id="novelBtn" class="primary-action" type="button">生成正文内容</button>
          </section>
        </aside>

        <section class="output-pane">
          <section class="hero-output">
            <article class="cover-stage">
              <div class="output-header">
                <h2>封面</h2>
                <span id="coverMeta" class="status-pill">待生成</span>
              </div>
              <div id="coverOutput" class="cover-output"></div>
            </article>

            <article class="output-section">
              <div class="output-header">
                <h2>剧情走向</h2>
                <span id="directionsMeta" class="status-pill">多线路</span>
              </div>
              <div id="directionsOutput" class="choice-list">暂无内容</div>
            </article>
          </section>

          <section class="output-section">
            <div class="output-header">
              <h2>完整大纲</h2>
              <span id="plotMeta" class="status-pill">待生成</span>
            </div>
            <div id="plotOutput" class="prose-output">暂无内容</div>
          </section>

          <section class="output-section">
            <div class="output-header">
              <h2>正文内容</h2>
              <span id="novelMeta" class="status-pill">第一章</span>
            </div>
            <div id="novelOutput" class="novel-output">暂无内容</div>
          </section>

          <section class="tool-grid">
            <article class="output-section">
              <div class="output-header">
                <h2>角色关系网</h2>
                <span class="status-pill">可拖拽</span>
              </div>
              <div id="networkCanvas" class="network-canvas"></div>
            </article>

            <article class="output-section">
              <div class="output-header">
                <h2>章节情报</h2>
                <button id="chapterIntelBtn" type="button">汇总</button>
              </div>
              <textarea id="chapterText" class="tool-input" placeholder="粘贴章节正文"></textarea>
              <div id="chapterIntelOutput" class="compact-output">暂无内容</div>
            </article>
          </section>

          <section class="tool-grid">
            <article class="output-section">
              <div class="output-header">
                <h2>拆书仿写</h2>
                <button id="deconstructBtn" type="button">拆书</button>
              </div>
              <textarea id="deconstructText" class="tool-input" placeholder="粘贴要拆解的章节或样书片段"></textarea>
              <pre id="deconstructOutput">暂无内容</pre>
            </article>

            <article class="output-section">
              <div class="output-header">
                <h2>审稿功能</h2>
                <button id="reviewBtn" type="button">审稿</button>
              </div>
              <textarea id="reviewText" class="tool-input" placeholder="粘贴正文，查看 AI 检测、亮点和修改意见"></textarea>
              <pre id="reviewOutput">暂无内容</pre>
            </article>
          </section>

          <section class="tool-grid">
            <article class="output-section">
              <div class="output-header">
                <h2>平台资讯</h2>
                <button id="infoBtn" type="button">查询</button>
              </div>
              <div class="inline-fields">
                <input id="infoQuery" type="text" placeholder="题材、平台、签约、榜单、更新节奏" />
                <input id="infoPlatform" type="text" placeholder="番茄 / 起点 / 晋江 / 七猫" />
              </div>
              <pre id="infoOutput">暂无内容</pre>
            </article>

            <article class="output-section">
              <div class="output-header">
                <h2>历史记录</h2>
                <button id="historyBtn" type="button">刷新</button>
              </div>
              <div id="historyOutput" class="history-list">暂无记录</div>
            </article>
          </section>

          <section class="output-section">
            <div class="output-header">
              <h2>文风分析 JSON</h2>
              <span id="analysisMeta" class="status-pill">待分析</span>
            </div>
            <pre id="styleOutput">暂无分析结果</pre>
          </section>

          <section class="output-section">
            <div class="output-header">
              <h2>世界观</h2>
              <span id="worldMeta" class="status-pill">待生成</span>
            </div>
            <div id="worldOutput" class="prose-output">暂无内容</div>
          </section>
        </section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
